<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Digital Products Store</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#f8f9fa;color:#1a1a2e;line-height:1.6}
.hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:60px 20px;text-align:center}
.hero h1{font-size:2.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:12px}
.hero p{font-size:1.1rem;opacity:.85;max-width:600px;margin:0 auto}
.container{max-width:1100px;margin:0 auto;padding:40px 20px}
.section-title{font-size:1.5rem;font-weight:700;margin-bottom:24px;color:#1a1a2e}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.product-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.product-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.product-cover{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:#e9ecef}
.product-info{padding:20px;flex:1;display:flex;flex-direction:column}
.product-badge{display:inline-block;background:#e8f4fd;color:#0f3460;font-size:.8rem;font-weight:600;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px}
.product-title{font-size:1.2rem;font-weight:700;margin-bottom:8px;color:#1a1a2e}
.product-desc{font-size:.9rem;color:#6c757d;margin-bottom:12px;line-height:1.6;flex:1}
.product-features{list-style:none;margin-bottom:16px}
.product-features li{font-size:.85rem;color:#495057;padding:4px 0;display:flex;align-items:center;gap:6px}
.product-features li::before{content:"✓";color:#0f3460;font-weight:700}
.product-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:12px;border-top:1px solid #f0f0f0}
.product-price{font-size:1.4rem;font-weight:800;color:#0f3460}
.btn-buy{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#0f3460,#1a1a2e);color:#fff;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s}
.btn-buy:hover{opacity:.9}
.footer{text-align:center;padding:40px 20px;color:#adb5bd;font-size:.85rem;border-top:1px solid #e9ecef;margin-top:20px}
.footer a{color:#0f3460;text-decoration:none}
@media(max-width:640px){.hero h1{font-size:1.8rem}.products-grid{grid-template-columns:1fr}.product-footer{flex-direction:column;gap:12px;align-items:stretch}.btn-buy{justify-content:center}}
</style>
</head>
<body>
<div class="hero">
  <h1>Digital Products Store</h1>
  <p>Premium digital products for productivity, creativity, and professional growth. Instant download after purchase.</p>
</div>
<div class="container">
  <h2 class="section-title">Featured Products</h2>
  <div class="products-grid" id="productsGrid"></div>
</div>
<div class="footer">
  <p>Contact for purchase: <a href="mailto:contact@example.com">contact@example.com</a></p>
  <p>All digital downloads &mdash; no physical items are shipped.</p>
</div>
<script>
const products=[{id:"cecdd7bb",title:"Freelancer Project Dashboard",description:"A complete Notion template for freelancers to manage multiple projects, track invoices, monitor deadlines, and organize client communications. Perfect for independent designers, developers, and consultants.",price:9,badge:"Notion Template",features:["Project database with status tracking","Invoice tracker with payment status","Client CRM with contact info","Weekly planner view","Goal setting dashboard","Time tracking log"],cover:"products/cover_cecdd7bb.png",download:"products/notion_template_cecdd7bb.zip"},{id:"6e7d0381",title:"Sample Product",description:"A great digital product template. Instant digital download.",price:9,badge:"Notion Template",features:["Digital download","Compatible with desktop and mobile","Easy to use"],cover:"products/cover_6e7d0381.png",download:"products/notion_template_6e7d0381.zip"}];
document.getElementById("productsGrid").innerHTML=products.map(p=>{
const fl=p.features.map(f=>"<li>"+f+"</li>").join("");
return '<div class="product-card"><img class="product-cover" src="'+p.cover+'" alt="'+p.title+'" loading="lazy" onerror="this.style.display=\'none\'"><div class="product-info"><span class="product-badge">'+p.badge+'</span><h3 class="product-title">'+p.title+'</h3><p class="product-desc">'+p.description+'</p><ul class="product-features">'+fl+'</ul><div class="product-footer"><span class="product-price">$'+p.price+'</span><a class="btn-buy" href="'+p.download+'" download>Download</a></div></div></div>'
}).join("");
</script>
</body>
</html>
